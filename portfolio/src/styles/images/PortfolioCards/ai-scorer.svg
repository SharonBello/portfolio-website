<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#041A14"/>
      <stop offset="100%" stop-color="#08261E"/>
    </linearGradient>
  </defs>
  <rect width="600" height="340" fill="url(#bg)"/>
  <!-- Score bars -->
  <g transform="translate(180,160)">
    <!-- LOTS -->
    <rect x="0" y="-80" width="30" height="80" rx="4" fill="#2E7D72" opacity="0.3"/>
    <rect x="0" y="-60" width="30" height="60" rx="4" fill="#2E7D72" opacity="0.8"/>
    <text x="15" y="14" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(46,125,114,0.6)">LOTS</text>
    <!-- ANALYSIS -->
    <rect x="44" y="-80" width="30" height="80" rx="4" fill="#2E7D72" opacity="0.3"/>
    <rect x="44" y="-56" width="30" height="56" rx="4" fill="#2E7D72" opacity="0.75"/>
    <text x="59" y="14" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(46,125,114,0.6)">ANALY.</text>
    <!-- HOTS -->
    <rect x="88" y="-80" width="30" height="80" rx="4" fill="#2E7D72" opacity="0.3"/>
    <rect x="88" y="-72" width="30" height="72" rx="4" fill="#2E7D72" opacity="0.9"/>
    <text x="103" y="14" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(46,125,114,0.6)">HOTS</text>
    <!-- BRIDGING -->
    <rect x="132" y="-80" width="30" height="80" rx="4" fill="#2E7D72" opacity="0.3"/>
    <rect x="132" y="-48" width="30" height="48" rx="4" fill="#2E7D72" opacity="0.7"/>
    <text x="147" y="14" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(46,125,114,0.6)">BRIDG.</text>
    <!-- Score circle -->
    <circle cx="240" cy="-40" r="44" fill="none" stroke="#2E7D72" stroke-width="3" opacity="0.3"/>
    <circle cx="240" cy="-40" r="44" fill="none" stroke="#2E7D72" stroke-width="3" stroke-dasharray="220 276" stroke-dashoffset="55" stroke-linecap="round"/>
    <text x="240" y="-30" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#2E7D72">8</text>
    <text x="240" y="-14" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(46,125,114,0.6)">/10</text>
  </g>
  <!-- Labels -->
  <text x="300" y="228" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#2E7D72">AI Bagrut Scorer</text>
  <text x="300" y="254" text-anchor="middle" font-family="sans-serif" font-size="13" fill="rgba(46,125,114,0.65)">MOE Rubric-Based · Instant Feedback</text>
  <rect x="200" y="276" width="200" height="24" rx="12" fill="rgba(46,125,114,0.1)" stroke="rgba(46,125,114,0.3)" stroke-width="1"/>
  <text x="300" y="292" text-anchor="middle" font-family="sans-serif" font-size="11" fill="rgba(46,125,114,0.7)">AI · LOTS · Analysis · HOTS · Bridging</text>
</svg>
